name: Update TLE Catalog

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      force_full:
        description: "Force full Space-Track GP catalog refresh"
        required: false
        default: "false"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Update catalog mirror
        env:
          SPACE_TRACK_IDENTITY: ${{ secrets.SPACE_TRACK_IDENTITY }}
          SPACE_TRACK_PASSWORD: ${{ secrets.SPACE_TRACK_PASSWORD }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          PUBLIC_CATALOG_BASE_URL: ${{ secrets.PUBLIC_CATALOG_BASE_URL }}
          FORCE_FULL: ${{ github.event.inputs.force_full || 'false' }}
        run: python scripts/mirror_spacetrack.py --output-dir build/catalog
